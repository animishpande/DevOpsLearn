name: CI Pipeline

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    build-and-test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '22.12.0'
            
            - name: Install Dependencies
              run: npm ci

            - name: Type Check
              run: npx tsc --noEmit
            
            - name: Build Project
              run: npm run build
